<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Namima</title>
  <meta name="description" content="Namima: safe ambient water surface for Music SYNC." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
  <meta name="theme-color" content="#05060a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Namima" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    html, body { margin:0; padding:0; overflow:hidden; background:#05060a; }
    canvas { display:block; }
    #startOverlay{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.65);
      color:#e8e8e8;
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing:0.02em;
      z-index:30;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    #startOverlay .box{
      padding:18px 20px;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:12px;
      background:rgba(10,10,14,0.55);
      max-width: 320px;
      text-align:center;
    }
    .start-title{
      font-weight:700;
      font-size:20px;
      margin-bottom:6px;
    }
    .start-sub{
      opacity:.8;
    }
    .start-sync-note{
      opacity:.68;
      margin-top:10px;
      font-size:12px;
    }
    #hint{
      position:fixed; left:10px; top:10px;
      color: rgba(255,255,255,0.55);
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, sans-serif;
      z-index:5;
      user-select:none;
    }
    #controlBar{
      position:fixed; left:10px; right:10px; bottom:10px;
      z-index:12;
      display:flex;
      gap:6px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      user-select:none;
    }
    #controlBar button,
    #controlBar select,
    #controlBar summary,
    #moodBadge{
      appearance:none;
      border:1px solid rgba(210,235,255,0.28);
      border-radius:999px;
      background:rgba(10,18,26,0.48);
      color:rgba(230,245,255,0.82);
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing:0.04em;
      padding:7px 11px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #moodBadge{
      cursor:default;
      color:rgba(232,246,255,0.72);
      background:rgba(10,18,26,0.36);
    }
    #packetToggle.primary-control{
      border-color:rgba(184,238,205,0.42);
      background:rgba(32,78,62,0.58);
      color:rgba(235,255,244,0.94);
    }
    #controlBar select{
      max-width:132px;
    }
    #controlBar button:active,
    #controlBar select:active,
    #controlBar summary:active{
      background:rgba(34,72,94,0.58);
    }
    .advanced-controls{
      position:relative;
    }
    .advanced-controls summary{
      list-style:none;
      min-height:18px;
    }
    .advanced-controls summary::-webkit-details-marker{ display:none; }
    .advanced-controls[open]{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      padding:6px;
      border-radius:18px;
      background:rgba(2,6,10,0.52);
      border:1px solid rgba(210,235,255,0.14);
    }
    #packetPanel{
      position:fixed; left:10px; top:10px;
      z-index:13;
      width:min(420px, calc(100vw - 20px));
      max-height:calc(100vh - 20px);
      overflow:auto;
      display:none;
      gap:8px;
      padding:12px;
      border:1px solid rgba(210,235,255,0.24);
      border-radius:12px;
      background:rgba(8,14,20,0.78);
      color:rgba(232,246,255,0.86);
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
      backdrop-filter: blur(10px);
    }
    #packetPanel.is-open{ display:grid; }
    #packetPanel h2{
      margin:0;
      font-size:14px;
      letter-spacing:0.04em;
    }
    #packetPanel p{ margin:0; color:rgba(232,246,255,0.66); }
    #packetPanel textarea,
    #packetPanel pre{
      width:100%;
      min-height:112px;
      margin:0;
      border:1px solid rgba(210,235,255,0.2);
      border-radius:8px;
      background:rgba(2,6,10,0.62);
      color:rgba(232,246,255,0.9);
      padding:8px;
      font: 11px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space:pre-wrap;
      overflow:auto;
    }
    #packetPanel textarea{ resize:vertical; }
    .packet-actions{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .packet-actions button{
      min-height:34px;
      border:1px solid rgba(210,235,255,0.26);
      border-radius:999px;
      background:rgba(20,38,48,0.64);
      color:rgba(232,246,255,0.9);
      cursor:pointer;
      padding:0 10px;
      font:inherit;
    }
    #packetStatus.is-ok{ color:rgba(184,238,205,0.9); }
    #packetStatus.is-error{ color:rgba(255,198,188,0.92); }
    .stack-return{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
      padding:7px;
      border:1px solid rgba(210,235,255,0.14);
      border-radius:10px;
      background:rgba(2,6,10,0.36);
    }
    .stack-return a{
      min-height:28px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(210,235,255,0.18);
      border-radius:999px;
      background:rgba(20,38,48,0.48);
      color:rgba(232,246,255,0.78);
      text-decoration:none;
      padding:0 9px;
      font:11px/1.2 system-ui,-apple-system,Segoe UI,sans-serif;
      letter-spacing:0.03em;
    }
    .stack-return a:hover,.stack-return a:focus-visible{
      color:rgba(235,255,244,0.96);
      border-color:rgba(184,238,205,0.36);
    }
    .share-link-button{
      position:fixed; top:calc(10px + env(safe-area-inset-top,0px)); right:calc(10px + env(safe-area-inset-right,0px));
      z-index:20; min-height:30px; border:1px solid rgba(210,235,255,0.24); border-radius:999px;
      background:rgba(10,18,26,0.42); color:rgba(230,245,255,0.74); font:11px/1 system-ui,-apple-system,Segoe UI,sans-serif;
      letter-spacing:0.08em; padding:0 9px; cursor:pointer; opacity:0.66; backdrop-filter:blur(8px);
    }
    .share-link-button:hover,.share-link-button:focus-visible{ opacity:1; }
    .share-link-status{
      position:fixed; top:calc(48px + env(safe-area-inset-top,0px)); right:calc(10px + env(safe-area-inset-right,0px));
      z-index:20; max-width:min(320px,calc(100vw - 20px)); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      border:1px solid rgba(210,235,255,0.16); border-radius:999px; background:rgba(10,18,26,0.62);
      color:rgba(230,245,255,0.68); font:10px/1.2 ui-monospace,SFMono-Regular,Consolas,monospace; padding:7px 9px; backdrop-filter:blur(8px);
    }
    @media (max-width: 680px){
      #packetPanel{
        left:8px; right:8px; top:8px;
        width:auto;
      }
      #controlBar{
        left:10px;
        right:10px;
        justify-content:center;
        flex-wrap:wrap;
      }
      #packetToggle.primary-control,
      #moodBadge{
        min-height:40px;
      }
    }
  </style>
</head>
<body>
  <button class="share-link-button" type="button" data-share-link aria-label="Share or copy this page URL">URL</button>
  <span class="share-link-status" data-share-link-status hidden></span>
  <div id="startOverlay">
    <div class="box">
      <div class="start-title">Tap to start</div>
      <div class="start-sub">音を有効化します</div>
      <div class="start-sync-note">Music SYNC後も、ここを押すまで音は始まりません。</div>
    </div>
  </div>

  <div id="hint">Namima / Tapで聴く ambient</div>
  <div id="controlBar" aria-label="Namima controls">
    <button id="packetToggle" class="primary-control" type="button" aria-label="Open Music SYNC panel">Music SYNC</button>
    <button id="autoToggle" type="button" aria-label="Toggle safe auto mood">Auto: Off</button>
    <div id="moodBadge" aria-live="polite">mood: water_day</div>
    <details class="advanced-controls">
      <summary>細かく</summary>
      <select id="moodSelect" aria-label="Select mood">
        <option value="water_day">water_day</option>
        <option value="garden_morning">garden_morning</option>
        <option value="family_room">family_room</option>
        <option value="soft_sleep">soft_sleep</option>
        <option value="transparent_evening">transparent_evening</option>
      </select>
      <button id="modeToggle" type="button" aria-label="Switch visual mode">Visual: Water</button>
      <button id="traceSave" type="button" aria-label="Save local trace summary">TRACE</button>
    </details>
  </div>

  <section id="packetPanel" aria-label="Music SYNC mood receiver">
    <h2>SYNC後は、Tap to start。</h2>
    <p>MusicでSYNCするとsafe moodが自動で寄ります。音を聴く時だけ画面をタップします。</p>
    <p id="packetStatus">MusicでSYNCすると自動受信します。貼り付け欄はfallbackです。</p>
    <div class="stack-return" aria-label="Music Stack return links">
      <a href="https://quietbriony.github.io/Music/fm.html?to=namima">Hazama FM</a>
      <a href="https://quietbriony.github.io/Music/band-room.html?to=namima">Band Room</a>
      <a href="https://quietbriony.github.io/drum-floor/?from=namima">Drum Floor</a>
      <a href="https://quietbriony.github.io/chill/session.html?from=namima">Chill</a>
      <a href="https://quietbriony.github.io/openclaw/?from=namima">OpenClaw</a>
    </div>
    <div class="packet-actions">
      <button id="packetClose" type="button">閉じる</button>
    </div>
    <details>
      <summary>JSON fallbackを開く</summary>
      <textarea id="packetInput" spellcheck="false" placeholder="{ &quot;source_repo&quot;: &quot;Music&quot;, ... }"></textarea>
      <div class="packet-actions">
        <button id="packetRead" type="button">読む</button>
        <button id="packetApply" type="button">moodへ反映</button>
        <button id="packetClear" type="button">消す</button>
      </div>
      <pre id="packetOutput">まだ読んでいません。</pre>
    </details>
  </section>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <!-- Tone.js -->
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

  <script src="./audio.js?v=stack-3"></script>
  <script src="./music-session-adapter.js?v=stack-3"></script>
  <script src="./sketch.js?v=stack-3"></script>
  <script>
    (() => {
      const button = document.querySelector("[data-share-link]");
      const status = document.querySelector("[data-share-link-status]");
      if (!button) return;
      const label = button.textContent;
      const showUrl = (url) => {
        button.title = url;
        if (status) {
          status.hidden = false;
          status.textContent = url;
        }
      };
      const copyUrl = async (url) => {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          return true;
        }
        return false;
      };
      button.addEventListener("click", async () => {
        const url = window.location.href;
        showUrl(url);
        try {
          if (navigator.share) await navigator.share({ title: document.title || "Namima", url });
          else if (!(await copyUrl(url))) window.prompt("Copy URL", url);
          button.textContent = "copied";
        } catch (error) {
          if (error?.name !== "AbortError") window.prompt("Copy URL", url);
        }
        window.clearTimeout(button._shareLinkTimer);
        button._shareLinkTimer = window.setTimeout(() => {
          button.textContent = label;
          if (status) status.hidden = true;
        }, 4200);
      });
    })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("[Namima] service worker registration failed", error);
        });
      });
    }
  </script>
</body>
</html>
